name: Update Stars
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:  # 手动触发

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update star counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取索引
          PL=$(gh api repos/${{ github.repository }}/contents/plugins.json --jq '.content' | base64 -d)
          SK=$(gh api repos/${{ github.repository }}/contents/skills.json --jq '.content' | base64 -d)
          PL_SHA=$(gh api repos/${{ github.repository }}/contents/plugins.json --jq '.sha')
          SK_SHA=$(gh api repos/${{ github.repository }}/contents/skills.json --jq '.sha')

          # 提取所有 repo 并查询 star
          ALL_REPOS=$(echo "$PL" | jq -r '.[].repo' && echo "$SK" | jq -r '.[].repo')

          # 逐个查询 star 并更新
          NEW_PL="$PL"
          NEW_SK="$SK"

          for repo in $ALL_REPOS; do
            stars=$(gh api "repos/$repo" --jq '.stargazers_count' 2>/dev/null || echo "0")
            # 更新 plugins.json
            NEW_PL=$(echo "$NEW_PL" | jq --arg repo "$repo" --argjson stars "$stars" \
              'map(if .repo == $repo then .stars = $stars else . end)')
            # 更新 skills.json
            NEW_SK=$(echo "$NEW_SK" | jq --arg repo "$repo" --argjson stars "$stars" \
              'map(if .repo == $repo then .stars = $stars else . end)')
          done

          # 写回
          echo "$NEW_PL" | base64 > /tmp/pl.b64
          echo "$NEW_SK" | base64 > /tmp/sk.b64

          gh api repos/${{ github.repository }}/contents/plugins.json -X PUT \
            -f message="chore: update stars" \
            -f sha="$PL_SHA" \
            -f content="$(cat /tmp/pl.b64)"

          gh api repos/${{ github.repository }}/contents/skills.json -X PUT \
            -f message="chore: update stars" \
            -f sha="$SK_SHA" \
            -f content="$(cat /tmp/sk.b64)"

          echo "done"
